name: Deploy to Station194

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync to gnos3.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SSH_USER:    ${{ vars.SSH_USER }}
          SSH_HOST:    ${{ vars.SSH_HOST }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          echo "Deploying to $SSH_USER@$SSH_HOST:$DEPLOY_PATH"
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='node_modules/' \
            --exclude='screenshots/' \
            --exclude='_test-upload/' \
            --exclude='.design-handoff-*' \
            -e 'ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519' \
            ./ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"

      - name: Summary
        run: echo "✓ Deployed commit ${{ github.sha }} to $DEPLOY_PATH"
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
